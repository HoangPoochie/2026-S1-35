<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Sign Up</title>
  <link rel="stylesheet" href="/src/styles/styles.css">
</head>
<body>
  <main>
    <section>
      <h1>User Sign Up</h1>
      <p>Create an account to join the workshop.</p>

      <form id="signup-form">
        <input id="display-name" type="text" placeholder="Your name" required>
        <input id="username" type="text" placeholder="Username" required>
        <input id="password" type="password" placeholder="Password" autocomplete="current-password" required>
        <input id="cohort-code" type="text" placeholder="Cohort code, e.g. ICT1">
        <button type="submit">Sign Up</button>
        <p id="error-message"></p>
      </form>

      <p>
        Already have an account?
        <a href="/src/pages/user/signin.html">Sign in here</a>
      </p>
    </section>
  </main>

  <script type="module" src="/src/js/user/signup-page.js"></script>
</body>
</html>
