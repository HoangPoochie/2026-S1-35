<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BVM — Module</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="data.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal-deep:   #1B4F6B;
      --teal-light:  #D6E9F0;
      --slate-pale:  #EBF3F7;
      --offwhite:    #F7FBFD;
      --white:       #FFFFFF;
      --text-dark:   #122433;
      --text-body:   #3A5A6E;
      --text-muted:  #7A9BAD;
      --accent:      #1B4F6B;
      --accent-light: #D6E9F0;
      --radius:      18px;
      --transition:  0.35s cubic-bezier(0.4,0,0.2,1);
    }

    html, body { height: 100%; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--offwhite);
      color: var(--text-dark);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── DOTS ── */
    .dots { display: flex; gap: 8px; align-items: center; }
    .dots span { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); display: inline-block; }
    .dots.sm span { width: 7px; height: 7px; }
    .dots.light span { background: rgba(255,255,255,0.5); }
    .dots.light span:last-child { background: rgba(255,255,255,0.9); }

    /* ── TOP NAV ── */
    .top-nav {
      background: var(--white);
      border-bottom: 1.5px solid var(--teal-light);
      padding: 0 40px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 200;
      box-shadow: 0 2px 16px rgba(27,79,107,0.07);
    }
    .nav-left { display: flex; align-items: center; gap: 14px; }
    .back-btn {
      display: flex; align-items: center; gap: 7px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 50px;
      border: 1px solid var(--teal-light);
      transition: var(--transition);
    }
    .back-btn:hover { background: var(--slate-pale); color: var(--accent); }
    .nav-module-title {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.05rem;
      color: var(--accent);
    }
    .nav-subtitle {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      font-weight: 500;
    }
    .nav-right { display: flex; align-items: center; gap: 16px; }
    .screen-counter {
      font-size: 0.78rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* ── PROGRESS BAR ── */
    .progress-bar-wrap {
      background: var(--teal-light);
      height: 4px;
      width: 100%;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--accent);
      transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    }

    /* ── MAIN CONTENT AREA ── */
    .content-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 56px 24px 40px;
      position: relative;
    }

    .screen {
      width: 100%;
      max-width: 820px;
      animation: screenIn 0.45s cubic-bezier(0.4,0,0.2,1) both;
    }

    @keyframes screenIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── SCREEN TYPES ── */

    /* title / definition / learning */
    .screen-eyebrow {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--accent);
      font-weight: 500;
      margin-bottom: 12px;
      opacity: 0.75;
    }
    .screen-heading {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      color: var(--text-dark);
      line-height: 1.15;
      margin-bottom: 24px;
    }
    .screen-body {
      font-size: 1.05rem;
      color: var(--text-body);
      line-height: 1.75;
      font-weight: 300;
      max-width: 640px;
    }
    .screen-divider {
      width: 60px; height: 3px;
      background: var(--accent);
      border-radius: 2px;
      margin: 24px 0;
      opacity: 0.4;
    }

    /* Activity card */
    .activity-card {
      background: var(--accent);
      border-radius: var(--radius);
      padding: 36px 40px;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
    }
    .activity-card::before {
      content: '';
      position: absolute;
      right: -40px; top: -40px;
      width: 200px; height: 200px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      pointer-events: none;
    }
    .activity-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: rgba(255,255,255,0.55);
      margin-bottom: 10px;
    }
    .activity-heading {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.5rem;
      color: var(--white);
      margin-bottom: 16px;
    }
    .activity-body {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.82);
      line-height: 1.7;
      font-weight: 300;
      white-space: pre-line;
    }
    .facilitator-note {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.15);
      font-size: 0.75rem;
      color: rgba(255,255,255,0.5);
      font-style: italic;
    }

    /* Skills overview grid */
    .skills-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-top: 8px;
    }
    .skill-chip {
      background: var(--white);
      border: 1.5px solid var(--teal-light);
      border-radius: 14px;
      padding: 18px 16px;
      transition: var(--transition);
    }
    .skill-chip:hover { border-color: var(--accent); transform: translateY(-2px); }
    .skill-chip-icon { font-size: 1.3rem; margin-bottom: 8px; }
    .skill-chip-name {
      font-family: 'Playfair Display', serif;
      font-size: 0.9rem;
      color: var(--text-dark);
      margin-bottom: 6px;
    }
    .skill-chip-desc { font-size: 0.75rem; color: var(--text-muted); line-height: 1.5; font-weight: 300; }

    /* Scenarios */
    .scenarios-list { display: flex; flex-direction: column; gap: 12px; margin-top: 8px; }
    .scenario-item {
      background: var(--white);
      border: 1.5px solid var(--teal-light);
      border-radius: 14px;
      padding: 18px 22px;
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }
    .scenario-num {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      color: var(--accent);
      opacity: 0.5;
      flex-shrink: 0;
      min-width: 24px;
    }
    .scenario-text { font-size: 0.9rem; color: var(--text-body); line-height: 1.6; font-weight: 300; }

    /* Numbered list (mindfulness) */
    .numbered-list { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
    .list-item {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      background: var(--white);
      border-radius: 12px;
      padding: 14px 18px;
      border: 1px solid var(--teal-light);
    }
    .list-num {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--accent-light);
      color: var(--accent);
      font-size: 0.75rem;
      font-weight: 500;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .list-label { font-weight: 500; font-size: 0.88rem; color: var(--text-dark); }
    .list-desc { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; font-weight: 300; }

    /* Callout */
    .callout-card {
      background: var(--white);
      border-left: 4px solid var(--accent);
      border-radius: 0 var(--radius) var(--radius) 0;
      padding: 28px 32px;
      box-shadow: 0 2px 16px rgba(27,79,107,0.07);
    }

    /* Learning card */
    .learning-card {
      background: var(--accent-light);
      border-radius: var(--radius);
      padding: 32px 36px;
    }
    .learning-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--accent);
      font-weight: 500;
      margin-bottom: 10px;
    }
    .learning-body {
      font-size: 1rem;
      color: var(--text-dark);
      line-height: 1.75;
      font-weight: 400;
    }

    /* Acknowledgement */
    .ack-card {
      background: var(--white);
      border-radius: var(--radius);
      border: 1.5px solid var(--teal-light);
      padding: 36px 40px;
      text-align: center;
    }
    .ack-dots { justify-content: center; margin-bottom: 20px; }
    .ack-body {
      font-size: 0.95rem;
      color: var(--text-body);
      line-height: 1.85;
      font-weight: 300;
      font-style: italic;
    }

    /* ── BOTTOM NAVIGATION ── */
    .bottom-nav {
      background: var(--white);
      border-top: 1.5px solid var(--teal-light);
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      position: sticky;
      bottom: 0;
      z-index: 200;
    }
    .nav-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 24px;
      border-radius: 50px;
      border: 1.5px solid var(--teal-light);
      background: var(--white);
      color: var(--text-body);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
    }
    .nav-btn:hover { border-color: var(--accent); color: var(--accent); }
    .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .nav-btn:disabled:hover { border-color: var(--teal-light); color: var(--text-body); }
    .nav-btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--white);
    }
    .nav-btn.primary:hover { opacity: 0.88; }

    .dots-nav { gap: 6px; }
    .dots-nav span {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--teal-light);
      cursor: pointer;
      transition: var(--transition);
      display: inline-block;
    }
    .dots-nav span.active { background: var(--accent); transform: scale(1.3); }

    /* ── COMPLETION SCREEN ── */
    .complete-screen {
      text-align: center;
      padding: 20px 0;
    }
    .complete-icon {
      width: 80px; height: 80px;
      background: var(--accent-light);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
      margin: 0 auto 24px;
    }
    .complete-heading {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 2rem;
      color: var(--text-dark);
      margin-bottom: 12px;
    }
    .complete-body {
      font-size: 0.95rem;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 32px;
      font-weight: 300;
    }
    .complete-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .complete-btn {
      padding: 13px 28px;
      border-radius: 50px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      text-decoration: none;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .complete-btn.primary { background: var(--accent); color: var(--white); border: 1.5px solid var(--accent); }
    .complete-btn.primary:hover { opacity: 0.88; }
    .complete-btn.secondary { background: var(--white); color: var(--accent); border: 1.5px solid var(--teal-light); }
    .complete-btn.secondary:hover { border-color: var(--accent); }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      .top-nav { padding: 0 16px; }
      .content-wrap { padding: 32px 16px 24px; }
      .bottom-nav { padding: 16px 20px; }
      .activity-card { padding: 24px 20px; }
      .skills-grid { grid-template-columns: 1fr 1fr; }
      .nav-subtitle { display: none; }
    }
    @media (max-width: 480px) {
      .skills-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- TOP NAV -->
  <nav class="top-nav">
    <div class="nav-left">
      <a href="index.html" class="back-btn">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M13 7H1M7 13L1 7l6-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Home
      </a>
      <div>
        <div class="nav-module-title" id="nav-title">Module</div>
        <div class="nav-subtitle" id="nav-subtitle">Skill</div>
      </div>
    </div>
    <div class="nav-right">
      <span class="screen-counter" id="screen-counter">1 / 1</span>
      <div class="dots sm" id="nav-dots-display">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
    </div>
  </nav>

  <!-- PROGRESS BAR -->
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progress-bar" style="width: 0%"></div>
  </div>

  <!-- CONTENT -->
  <div class="content-wrap">
    <div class="screen" id="screen-content">
      <!-- Rendered by JS -->
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-btn" id="btn-prev" onclick="navigate(-1)" disabled>
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M13 7H1M7 13L1 7l6-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Previous
    </button>
    <div class="dots dots-nav" id="dots-nav"></div>
    <button class="nav-btn primary" id="btn-next" onclick="navigate(1)">
      Next
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 7h12M7 1l6 6-6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </nav>

  <script>
    // ── INIT ──
    const params = new URLSearchParams(window.location.search);
    const moduleId = params.get('module') || 'introduction';

    let moduleData;
    if (moduleId === 'introduction') {
      moduleData = BVM_DATA.introduction;
    } else {
      moduleData = BVM_DATA.modules.find(m => m.id === moduleId) || BVM_DATA.modules[0];
    }

    // Apply accent colour from module data
    document.documentElement.style.setProperty('--accent', moduleData.color);
    document.documentElement.style.setProperty('--accent-light', moduleData.colorLight);

    const screens = moduleData.screens;
    let current = 0;

    // ── RENDER ──
    function render() {
      const total = screens.length;
      const screen = screens[current];
      const isLast = current === total - 1;

      // Update nav
      document.getElementById('nav-title').textContent = moduleData.title;
      document.getElementById('nav-subtitle').textContent = moduleData.subtitle;
      document.getElementById('screen-counter').textContent = `${current + 1} / ${total}`;

      // Progress bar
      document.getElementById('progress-bar').style.width = `${((current + 1) / total) * 100}%`;

      // Dots nav
      const dotsNav = document.getElementById('dots-nav');
      dotsNav.innerHTML = screens.map((_, i) =>
        `<span class="${i === current ? 'active' : ''}" onclick="goTo(${i})"></span>`
      ).join('');

      // Buttons
      document.getElementById('btn-prev').disabled = current === 0;
      const nextBtn = document.getElementById('btn-next');
      if (isLast) {
        nextBtn.innerHTML = 'Complete <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7l4 4 6-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>';
        nextBtn.onclick = showComplete;
      } else {
        nextBtn.innerHTML = 'Next <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 7h12M7 1l6 6-6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>';
        nextBtn.onclick = () => navigate(1);
      }

      // Screen content
      const el = document.getElementById('screen-content');
      el.style.animation = 'none';
      el.offsetHeight; // reflow
      el.style.animation = '';
      el.innerHTML = renderScreen(screen);
    }

    function renderScreen(s) {
      switch (s.type) {

        case 'title':
        case 'definition':
          return `
            <div class="screen-eyebrow">${moduleData.subtitle} — ${moduleData.title}</div>
            <h1 class="screen-heading">${s.heading}</h1>
            <div class="screen-divider"></div>
            <p class="screen-body">${s.body}</p>
          `;

        case 'acknowledgement':
          return `
            <div class="ack-card">
              <div class="dots ack-dots">
                <span></span><span></span><span></span><span></span><span></span>
              </div>
              <h2 class="screen-heading" style="font-size:1.5rem; margin-bottom:20px;">${s.heading}</h2>
              <p class="ack-body">${s.body}</p>
            </div>
          `;

        case 'skills-overview':
          return `
            <div class="screen-eyebrow">Introduction</div>
            <h1 class="screen-heading">${s.heading}</h1>
            <p class="screen-body" style="margin-bottom: 28px;">${s.body}</p>
            <div class="skills-grid">
              ${s.skills.map(sk => `
                <div class="skill-chip">
                  <div class="skill-chip-icon">${sk.icon}</div>
                  <div class="skill-chip-name">${sk.name}</div>
                  <div class="skill-chip-desc">${sk.desc}</div>
                </div>
              `).join('')}
            </div>
          `;

        case 'activity':
          return `
            <div class="activity-card">
              <div class="activity-label">Activity</div>
              <div class="activity-heading">${s.heading}</div>
              <div class="activity-body">${s.activity}</div>
              ${s.note ? `<div class="facilitator-note">${s.note}</div>` : ''}
            </div>
          `;

        case 'learning':
          return `
            <div class="learning-card">
              <div class="learning-label">What we learned</div>
              <p class="learning-body">${s.body}</p>
            </div>
          `;

        case 'callout':
          return `
            <h2 class="screen-heading" style="font-size:1.6rem; margin-bottom: 20px;">${s.heading}</h2>
            <div class="callout-card">
              <p class="screen-body">${s.body}</p>
            </div>
          `;

        case 'scenarios':
          return `
            <h2 class="screen-heading" style="font-size:1.6rem; margin-bottom: 8px;">${s.heading}</h2>
            <p class="screen-body" style="margin-bottom: 24px;">Position yourself — <em>Always</em> on one side, <em>Never</em> on the other.</p>
            <div class="scenarios-list">
              ${s.scenarios.map((sc, i) => `
                <div class="scenario-item">
                  <span class="scenario-num">${i + 1}</span>
                  <span class="scenario-text">${sc}</span>
                </div>
              `).join('')}
            </div>
          `;

        case 'list':
          return `
            <h2 class="screen-heading" style="font-size:1.6rem; margin-bottom: 20px;">${s.heading}</h2>
            <div class="numbered-list">
              ${s.items.map(item => `
                <div class="list-item">
                  <div class="list-num">${item.num}</div>
                  <div>
                    <div class="list-label">${item.label}</div>
                    <div class="list-desc">${item.desc}</div>
                  </div>
                </div>
              `).join('')}
            </div>
          `;

        default:
          return `<p>${JSON.stringify(s)}</p>`;
      }
    }

    function showComplete() {
      const el = document.getElementById('screen-content');
      el.style.animation = 'none';
      el.offsetHeight;
      el.style.animation = '';

      // Find next module
      const allIds = ['introduction', ...BVM_DATA.modules.map(m => m.id)];
      const currentIdx = allIds.indexOf(moduleId);
      const nextId = allIds[currentIdx + 1] || null;
      const nextModule = nextId === 'introduction' ? BVM_DATA.introduction :
                         BVM_DATA.modules.find(m => m.id === nextId);

      el.innerHTML = `
        <div class="complete-screen">
          <div class="complete-icon">${moduleData.icon}</div>
          <h1 class="complete-heading">${moduleData.title} Complete!</h1>
          <p class="complete-body">Well done — you've finished this module.<br>Keep exploring the other skills or head back to the dashboard.</p>
          <div class="complete-actions">
            <a href="index.html" class="complete-btn secondary">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M13 7H1M7 13L1 7l6-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
              Back to Home
            </a>
            ${nextModule ? `
              <a href="module.html?module=${nextId}" class="complete-btn primary">
                ${nextModule.icon} Next: ${nextModule.title}
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 7h12M7 1l6 6-6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </a>
            ` : `
              <a href="index.html" class="complete-btn primary">
                🎉 All done!
              </a>
            `}
          </div>
        </div>
      `;

      document.getElementById('btn-prev').style.display = 'none';
      document.getElementById('btn-next').style.display = 'none';
      document.getElementById('dots-nav').innerHTML = '';
      document.getElementById('progress-bar').style.width = '100%';
    }

    function navigate(dir) {
      current = Math.max(0, Math.min(screens.length - 1, current + dir));
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function goTo(index) {
      current = index;
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Boot
    render();
  </script>
</body>
</html>
